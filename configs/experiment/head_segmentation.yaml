# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: head_segmentation
  - override /model: head_segmentation
  - override /callbacks: head_segmentation
  - override /logger: many_loggers
  - override /trainer: gpu
  - override /extras: plot_wrongly_assigned_classes

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

find_lr: False
seed: "rand"
float32_matmul_precision: "high"
cleanup_mode: "all" # none, model_weights, all

trainer:
  min_epochs: 0
  max_epochs: 50
  #precision: 16-mixed
  #accumulate_grad_batches: 2

callbacks:
  model_checkpoint:
    monitor: "val/dice"
    mode: "max"
  early_stopping:
    monitor: "val/dice"
    mode: "max"
    patience: 12

model:
  model:
    _target_: segmentation_models_pytorch.FPN
    encoder_name: tu-tf_efficientnetv2_s
  lr: 1e-03
  criterion:
    alpha: 0.25
    gamma: 2.0
    smooth: 1e-6
  optimizer:
    weight_decay: 1e-5
    amsgrad: True

data:
  input_size: [192, 256]
  batch_size: 64
  num_workers: 12
  pin_memory: True

logger:
  wandb:
    project: "head_segmentation_v2"
    tags: ${tags}
    group: "head_segmentation"
extras:
  after_test_plots:
    enabled: false
    data_dir: ${paths.data_dir}
    input_size: ${data.input_size}
    transforms: ${data.test_transforms}
    batch_size: ${data.batch_size}
