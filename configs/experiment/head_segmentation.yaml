# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: head_segmentation
  - override /model: head_segmentation
  - override /callbacks: head_segmentation
  - override /logger: many_loggers
  - override /trainer: gpu
#  - override /extras: plot_video_probabilities

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

find_lr: False
seed: "rand"
clean-up: true

trainer:
  min_epochs: 0
  max_epochs: 50
  #precision: 16-mixed
  #accumulate_grad_batches: 2

callbacks:
  model_checkpoint:
    monitor: "val/pixel/f1"
    mode: "max"
  early_stopping:
    monitor: "val/pixel/f1"
    mode: "max"
    #patience: 15
    patience: ${trainer.max_epochs}

model:
  model:
    _target_: segmentation_models_pytorch.Unet
    encoder_name: tu-mobilenetv4_conv_small
  lr: 1e-03
  criterion:
    smooth: 1e-6
  optimizer:
    weight_decay: 1e-5
    amsgrad: True

data:
  input_size: [192, 256]
  batch_size: 64
  num_workers: 12
  pin_memory: True

logger:
  wandb:
    project: "head_segmentation"
    tags: ${tags}
    group: "head_segmentation"
