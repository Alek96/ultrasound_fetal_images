# @package _global_

defaults:
  - head_segmentation.yaml

# Augmentation experiment: Speckle Noise (multiplicative, physically realistic for ultrasound).
# The Speckle transform guards against masks internally, so only the image is noised. Inserted
# after ToDtype (float [0, 1]) and before Normalize to preserve full float precision (no uint8
# re-quantisation) while keeping the multiplicative model valid (values still proportional to
# intensity). Per-call sigma is sampled from [0, sigma].
data:
  train_transforms:
    - _target_: torchvision.transforms.v2.Grayscale

    - _target_: src.data.components.transforms.PadToAspectRatio
      size: ${data.input_size}
      fill:
        _target_: src.utils.utils.new_dict
        args:
          - - _target_: hydra.utils.get_object
              path: torchvision.tv_tensors.Image
            - 0
          - - _target_: hydra.utils.get_object
              path: torchvision.tv_tensors.Mask
            - 0
          - - other
            -
    - _target_: src.data.components.transforms.Resize
      size: ${data.input_size}
      interpolation:
        _target_: src.utils.utils.new_dict
        args:
          - - _target_: hydra.utils.get_object
              path: torchvision.tv_tensors.Image
            - _target_: hydra.utils.get_object
              path: torchvision.transforms.v2.InterpolationMode.BILINEAR
          - - _target_: hydra.utils.get_object
              path: torchvision.tv_tensors.Mask
            - _target_: hydra.utils.get_object
              path: torchvision.transforms.v2.InterpolationMode.NEAREST_EXACT
          - - other
            -

    - _target_: src.data.components.transforms.RandAugment
      policy:
        _target_: hydra.utils.get_object
        path: src.data.components.transforms.RandAugmentPolicy.RAND_AUGMENT
      magnitude: 11

    - _target_: torchvision.transforms.v2.RandomHorizontalFlip
      p: 0.5
    - _target_: torchvision.transforms.v2.RandomVerticalFlip
      p: 0.5

    - _target_: torchvision.transforms.v2.RandomAffine
      degrees: 20
      translate: [0.1, 0.1]
      scale: [1.0, 1.2]

    - _target_: torchvision.transforms.v2.ToDtype
      dtype:
        _target_: src.utils.utils.new_dict
        args:
          - - _target_: hydra.utils.get_object
              path: torchvision.tv_tensors.Image
            - _target_: hydra.utils.get_object
              path: torch.float32
          - - _target_: hydra.utils.get_object
              path: torchvision.tv_tensors.Mask
            - _target_: hydra.utils.get_object
              path: torch.float32
          - - other
            -
      scale: True

    - _target_: src.data.components.transforms.Speckle
      sigma: 0.1

    - _target_: torchvision.transforms.v2.Normalize # ImageNet
      mean: [0.449]
      std: [0.226]

logger:
  wandb:
    group: "head_segmentation_speckle"
