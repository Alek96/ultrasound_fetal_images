# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: brain_planes
  - override /model: brain_planes
  - override /callbacks: brain_planes
  - override /logger: many_loggers
  - override /trainer: gpu
  - override /extras: plot_video_probabilities

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

find_lr: False
seed: "rand"
clean-up: true

trainer:
  min_epochs: 0
  max_epochs: 100
  #val_check_interval: 0.25
  accumulate_grad_batches: 4
  #precision: 16-mixed

callbacks:
  mix_up:
    #_target_: src.models.utils.callbacks.MixUpCallback
    _target_: src.models.utils.callbacks.MixUpV2Callback
    #_target_: src.models.utils.callbacks.VHMixUpCallback
    alpha: 0.4
    softmax_target: ${model.softmax_target}
    labels: 5
  stochastic_weight_averaging:
    swa_lrs:
    swa_epoch_start:
  model_checkpoint:
    #monitor: "val/tta/f1"
    monitor: "val/tta/acc_head"
    mode: "max"
  early_stopping:
    #monitor: "val/tta/f1"
    monitor: "val/tta/acc_head"
    mode: "max"
    patience: 10
    #patience: ${trainer.max_epochs}
  class_image_sampler:
    _target_: src.models.utils.callbacks.ClassImageSampler
    class_names:
      - "Trans-thalamic"
      - "Trans-cerebellum"
      - "Trans-ventricular"
      - "Other"
      - "Not A Brain"

model:
  criterion:
    weight:
      _target_: torch.tensor
      #"Trans-ventricular" "Trans-thalamic" "Trans-cerebellum" "Other" "Not A Brain"
      data: [1.37, 0.46, 1.08, 5.26, 0.5]
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32
    reduction: "none"
    label_smoothing: 0.02
  lr: 1e-03
  optimizer:
    weight_decay: 1e-05
  #scheduler:
  #  T_max: ${trainer.max_epochs}
  #  factor: 0.5
  #  patience: 5
  net_spec:
    name: "efficientnet_v2_m"
  num_classes: 5
  softmax_target: True
  vta_transforms:
    horizontal_flips: [False, True]
    vertical_flips: [False, True]
    rotate_degrees: [0]
    translates: [[0.0, 0.0]]
    scales: [1.0]
  tta_transforms:
    horizontal_flips: [False, True]
    vertical_flips: [False, True]
    rotate_degrees: [0, -5, 5]
    translates: [[0.0, 0.0]]
    scales: [1.0, 1.10]

data:
  data_name: FETAL_BRAIN_PLANES_2
  input_size: [192, 256]
  #input_size: [96, 128]
  #input_size: [165, 240]
  batch_size: 16
  num_workers: 12
  pin_memory: True
  sampler: "under"
  sampler_max_sizes: [[-1, -1, -1, -1, 500]]
  train_transforms:
    - _target_: torchvision.transforms.Grayscale
    - _target_: src.data.components.transforms.PadToAspectRation
      size: ${data.input_size}
      fill: 0
    - _target_: torchvision.transforms.Resize
      size: ${data.input_size}
      antialias: False

    #- _target_: torchvision.transforms.AutoAugment
    #  policy:
    #    _target_: hydra.utils.get_object
    #    path: torchvision.transforms.AutoAugmentPolicy.IMAGENET
    - _target_: torchvision.transforms.RandAugment
      magnitude: 11
    #- _target_: src.data.components.transforms.RandAugment
    #  policy:
    #    _target_: hydra.utils.get_object
    #    path: src.data.components.transforms.RandAugmentPolicy.RAND_AUGMENT_CUTOUT
    #  num_ops: 3
    #  magnitude: 10
    #  arg1: 0.7
    #  arg2: 5
    #- _target_: torchvision.transforms.TrivialAugmentWide
    #- _target_: torchvision.transforms.AugMix

    - _target_: torchvision.transforms.RandomHorizontalFlip
      p: 0.5
    - _target_: torchvision.transforms.RandomVerticalFlip
      p: 0.5

    - _target_: torchvision.transforms.RandomAffine
      degrees: 20
      translate: [0.1, 0.1]
      scale: [1.0, 1.2]

    #- _target_: src.data.components.transforms.RandomCutout
    #  n_holes: 5
    #  length: 40
    #  p: 0.1

    - _target_: torchvision.transforms.ConvertImageDtype
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32

    #- _target_: torchvision.transforms.Normalize  # FetalBrain
    #  mean: 0.17
    #  std: 0.19
    #- _target_: torchvision.transforms.Normalize  # ImageNet
    #  mean: 0.449
    #  std: 0.226

  test_transforms:
    - _target_: torchvision.transforms.Grayscale
    - _target_: src.data.components.transforms.PadToAspectRation
      size: ${data.input_size}
      fill: 0
    - _target_: torchvision.transforms.Resize
      size: ${data.input_size}
      antialias: False
    - _target_: torchvision.transforms.ConvertImageDtype
      dtype:
        _target_: hydra.utils.get_object
        path: torch.float32

logger:
  wandb:
    project: "brain_planes_v2"
    tags: ${tags}
    group: "brain_planes"
extras:
  after_test_plots:
    enabled: false
    video_dataset_dir: "US_VIDEOS_ssim_0.7_crop"
