name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*", "develop"]

permissions:
  contents: read

jobs:
  run-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"] # "ubuntu-latest", "macos-latest", "windows-latest"
        python-version: ["3.12"]

    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package managers
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false

      - name: Install dependencies
        run: |
          poetry install

      - name: List dependencies
        run: |
          python -m pip list

      - name: Run pytest
        run: |
          pytest -v

  # upload code coverage report
  code-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package managers
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false

      - name: Install dependencies
        run: |
          poetry install

      - name: Run tests and collect coverage
        run: pytest --cov=src --cov-branch --cov-report=xml # NEEDS TO BE UPDATED WHEN CHANGING THE NAME OF "src" FOLDER

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show Codecov link
        if: always()
        run: |
          echo "### Codecov report" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Open Codecov report](https://app.codecov.io/github/${{ github.repository }}/commit/${{ github.sha }})" >> "$GITHUB_STEP_SUMMARY"
